name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish GameScoreboard.csproj -c Release -o published

      - name: Verify publish output
        run: |
          file_count=$(find published/wwwroot -type f | wc -l)
          echo "Published $file_count files"
          test "$file_count" -gt 50
          test -f published/wwwroot/index.html
          test -f published/wwwroot/_framework/blazor.webassembly.js
          test -f published/wwwroot/staticwebapp.config.json

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_DUNE_02544D51E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "published/wwwroot"
          api_location: ""
          output_location: ""
          skip_app_build: true

      - name: Diagnose deployed static assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          for attempt in 1 2 3; do
            echo "Diagnostic attempt $attempt"
            sleep 30
            for path in index.html _framework/blazor.webassembly.js css/app.css; do
              url="https://nice-dune-02544d51e.7.azurestaticapps.net/${path}"
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
              content_type=$(curl -sI "$url" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2; exit}')
              echo "$path status=$status content-type=${content_type:-missing}"
            done
          done

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_DUNE_02544D51E }}
          action: "close"
