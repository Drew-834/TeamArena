name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish GameScoreboard.csproj -c Release -o published

      - name: Prepare and verify deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -a published/wwwroot/. deploy/
          file_count=$(find deploy -type f | wc -l)
          echo "Prepared $file_count files for deployment"
          test "$file_count" -gt 50
          test -f deploy/index.html
          test -f deploy/_framework/blazor.webassembly.js
          test -f deploy/_framework/blazor.boot.json
          test -f deploy/staticwebapp.config.json
          cp deploy/index.html deploy/404.html

      - name: Deploy with SWA CLI
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
        run: npx --yes @azure/static-web-apps-cli@latest deploy deploy --env production --verbose

      - name: Verify deployed static assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          sleep 45
          for path in index.html _framework/blazor.webassembly.js _framework/blazor.boot.json css/app.css; do
            url="https://red-ocean-08c63b90f.1.azurestaticapps.net/${path}"
            echo "Checking $url"
            content_type=$(curl -sI "$url" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2; exit}')
            echo "Content-Type: $content_type"
            case "$path" in
              _framework/blazor.webassembly.js)
                echo "$content_type" | grep -qi 'javascript\|ecmascript' || {
                  echo "::error::Blazor JS not served correctly. Refresh the Azure deployment token secret AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F from teamarena-client-start -> Manage deployment token."
                  exit 1
                }
                ;;
              _framework/blazor.boot.json)
                echo "$content_type" | grep -qi 'json' || {
                  echo "::error::Blazor boot JSON not served correctly. Refresh the Azure deployment token secret."
                  exit 1
                }
                ;;
              css/app.css)
                echo "$content_type" | grep -qi 'css' || {
                  echo "::error::CSS not served correctly. Refresh the Azure deployment token secret."
                  exit 1
                }
                ;;
            esac
          done

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
          action: "close"
