name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish GameScoreboard.csproj -c Release -o published

      - name: Prepare and verify deployment bundle
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -a published/wwwroot/. deploy/
          file_count=$(find deploy -type f | wc -l)
          echo "Prepared $file_count files for deployment"
          test "$file_count" -gt 50
          test -f deploy/index.html
          test -f deploy/_framework/blazor.webassembly.js
          test -f deploy/_framework/blazor.boot.json
          test -f deploy/staticwebapp.config.json
          cp deploy/index.html deploy/404.html

      - name: Deploy with SWA CLI
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
        run: npx --yes @azure/static-web-apps-cli@latest deploy deploy --env production --verbose

      - name: Verify deployed static assets
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          for attempt in 1 2 3; do
            echo "Verification attempt $attempt"
            sleep 30
            js_type=$(curl -sI "https://red-ocean-08c63b90f.1.azurestaticapps.net/_framework/blazor.webassembly.js" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print $2; exit}')
            index_status=$(curl -s -o /dev/null -w "%{http_code}" "https://red-ocean-08c63b90f.1.azurestaticapps.net/index.html")
            echo "index.html=$index_status blazor.js=$js_type"
            if [ "$index_status" = "200" ] && echo "$js_type" | grep -qi 'javascript\|ecmascript'; then
              echo "Deployment verified"
              exit 0
            fi
          done
          echo "::error::Static assets not live after deploy. Confirm GitHub secret AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F matches teamarena-client-start -> Manage deployment token."
          exit 1

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
          action: "close"
