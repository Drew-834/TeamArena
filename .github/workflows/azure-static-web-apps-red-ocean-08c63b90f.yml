name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish GameScoreboard.csproj -c Release -o publish

      - name: Verify publish output
        run: |
          ls -la publish/wwwroot/ | head -20
          test -f publish/wwwroot/index.html
          test -f publish/wwwroot/staticwebapp.config.json
          test -f publish/wwwroot/_framework/blazor.webassembly.js

      - name: Deploy to Azure Static Web Apps
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
        run: npx --yes @azure/static-web-apps-cli@latest deploy publish/wwwroot --env production

      - name: Verify production site
        if: github.event_name == 'push'
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://red-ocean-08c63b90f.1.azurestaticapps.net/index.html)
          echo "Production index.html HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::Azure SWA still returned $status for /index.html after deploy"
            exit 1
          fi

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_OCEAN_08C63B90F }}
          action: "close"
