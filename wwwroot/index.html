<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Team Arena</title>
    <base href="/" />
    <meta name="description" content="Team Arena - Performance scoreboard forged in the fires of competition." />
    <script>
        (function() {
            var debugEndpoint = 'http://127.0.0.1:7450/ingest/2cd11ed0-c4c1-45c9-bad6-633a57b3dc07';
            var apiHealthUrl = 'https://teamarena-api-start-d0g2bbetameabcha.eastus-01.azurewebsites.net/api/health';
            function agentDebugLog(hypothesisId, message, data) {
                // #region agent log
                fetch(debugEndpoint,{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'e68a4d'},body:JSON.stringify({sessionId:'e68a4d',runId:'cors-debug-pre-fix',hypothesisId:hypothesisId,location:'wwwroot/index.html:agent-cors-debug',message:message,data:data,timestamp:Date.now()})}).catch(function(){});
                // #endregion
            }
            agentDebugLog('H1,H2,H3', 'before health fetch', {
                origin: window.location.origin,
                href: window.location.href,
                apiHealthUrl: apiHealthUrl
            });
            fetch(apiHealthUrl).then(function(response) {
                agentDebugLog('H1,H2,H4,H5', 'health fetch resolved', {
                    status: response.status,
                    ok: response.ok,
                    type: response.type,
                    url: response.url
                });
            }).catch(function(error) {
                agentDebugLog('H1,H2,H4,H5', 'health fetch failed', {
                    name: error && error.name,
                    message: error && error.message,
                    origin: window.location.origin
                });
            });
            window.addEventListener('unhandledrejection', function(event) {
                agentDebugLog('H4', 'unhandled promise rejection', {
                    reason: event.reason && (event.reason.message || String(event.reason))
                });
            });
        }());
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/elden-ring.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="favicon.png" rel="icon" type="image/png" />
    <script type="text/javascript">
        // GitHub Pages SPA redirect only — Azure SWA uses staticwebapp.config.json instead.
        (function(l) {
            if (l.hostname.endsWith('github.io') && l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function(s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
</head>
<body>
    <div id="app">
        <div class="elden-loading">
            <div class="elden-loading-rune"></div>
            <div class="elden-loading-text">Entering the Realm...</div>
        </div>
    </div>

    <div id="blazor-error-ui" class="hidden fixed bottom-0 w-full z-50 p-4" style="background: rgba(139,32,32,0.9); color: #e8e6e0; border-top: 1px solid #c43030;">
        An unhandled error has occurred.
        <a href="" class="reload" style="color: #e8d282; text-decoration: underline;">Reload</a>
        <a class="dismiss" style="color: #7a7768; margin-left: 1rem; cursor: pointer;">Dismiss</a>
    </div>

    <script src="js/app.js?v=8"></script>
    <script src="js/audio.js?v=2"></script>
    <script src="js/particles.js?v=2"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
